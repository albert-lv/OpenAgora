syntax = "proto3";
package arena.v1;
option go_package = "github.com/albert-lv/agent-arena/go/proto/arena/v1";

import "google/protobuf/timestamp.proto";
import "arena/v1/trajectory.proto";

service ArenaService {
  rpc CreateRollout(CreateRolloutRequest) returns (CreateRolloutResponse);
  rpc GetRollout(GetRolloutRequest) returns (Rollout);
  rpc StopRollout(StopRolloutRequest) returns (StopRolloutResponse);
  rpc ListRollouts(ListRolloutsRequest) returns (ListRolloutsResponse);
  rpc StreamTrajectory(StreamTrajectoryRequest) returns (stream TrajectoryStep);
  rpc GetTrajectory(GetTrajectoryRequest) returns (Trajectory);
}

message CreateRolloutRequest {
  string task_id = 1;
  SandboxConfig sandbox = 2;
  SamplingConfig sampling = 3;
  VerifyConfig verify = 4;
  string llm_backend = 5;
}

message CreateRolloutResponse {
  string rollout_id = 1;
}

message GetRolloutRequest {
  string rollout_id = 1;
}

message StopRolloutRequest {
  string rollout_id = 1;
}

message StopRolloutResponse {}

message ListRolloutsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListRolloutsResponse {
  repeated Rollout rollouts = 1;
}

message Rollout {
  string rollout_id = 1;
  string task_id = 2;
  string status = 3;  // "pending", "running", "success", "failed", "stopped"
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp finished_at = 5;
  float reward = 6;
}

message StreamTrajectoryRequest {
  string rollout_id = 1;
}

message GetTrajectoryRequest {
  string rollout_id = 1;
}

message Trajectory {
  repeated TrajectoryStep steps = 1;
}

message SandboxConfig {
  string image = 1;
  string memory = 2;
  double cpus = 3;
  map<string, string> env_vars = 4;
  bytes task_file = 5;
  int32 timeout_seconds = 6;
}

message VerifyConfig {
  string command = 1;
  string log_parser = 2;
  repeated string pass_to_pass = 3;
  repeated string fail_to_pass = 4;
}
