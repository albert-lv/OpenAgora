repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: 'node_modules/'
      - id: end-of-file-fixer
        exclude: 'node_modules/'
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
        exclude: '^(examples/code-colosseum/dashboard/node_modules|examples/code-colosseum/dashboard/dist|.*\.lock)/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(python/openagora-(verl|sdk)/|examples/code-colosseum/.*\.py$)
        exclude: '.*_pb2(_grpc)?\.py$'
      - id: ruff-format
        files: ^(python/openagora-(verl|sdk)/|examples/code-colosseum/.*\.py$)
        exclude: '.*_pb2(_grpc)?\.py$'
