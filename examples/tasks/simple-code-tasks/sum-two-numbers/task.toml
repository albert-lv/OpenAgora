schema_version = "1.0"

[task]
name = "sum-two-numbers"
description = "Write a function add(a, b) that returns the sum."

[environment]
image = "openagora-agent-minimal:latest"
memory = "1g"
cpus = 1.0
timeout_seconds = 300

[verifier]
command = "python -c \"import solution; assert solution.add(1, 2) == 3; assert solution.add(-1, 1) == 0\""
timeout_seconds = 60
