name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.x'
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync SDK
        run: cd python/openagora-sdk && uv sync --extra dev
      - name: Test SDK
        run: cd python/openagora-sdk && uv run python -m pytest
      - name: Sync verl
        run: cd python/openagora-verl && uv sync --extra dev
      - name: Test verl
        run: cd python/openagora-verl && uv run python -m pytest
      - name: Sync verify
        run: cd python/openagora-verify && uv sync --extra dev
      - name: Test verify
        run: cd python/openagora-verify && uv run python -m pytest
      - name: Sync CLI
        run: cd python/openagora-cli && uv sync --extra dev
      - name: Test CLI
        run: cd python/openagora-cli && uv run python -m pytest
      - name: Compile example Python scripts
        run: |
          python -m py_compile \
            examples/code-colosseum/backend/*.py \
            examples/code-colosseum/agent/*.py \
            examples/code-colosseum/training/*.py \
            examples/code-colosseum/tests/*.py \
            examples/quickstart/*.py \
            examples/relationship-chat-rl/*.py \
            examples/swe-agent/*.py \
            examples/verl-integration/*.py
